<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PokeAPI</title>
	<link rel="stylesheet" href="site.css">
	<link rel="stylesheet" href="pokemon.css">
	<script src="auth.js"></script>
	<script>requireAuth();</script>
</head>
<body>
	<site-header></site-header>
	<main class="pokemon-container">
		<div class="pokemon-content">
			<h1>Pokédex</h1>
			<p id="status">Cargando Pokémon...</p>

			<section class="filters" aria-label="Filtros de Pokémon">
				<div class="filter-group">
					<label for="filter-name">Nombre</label>
					<input id="filter-name" type="text">
				</div>

				<div class="filter-group">
					<label for="filter-id">ID</label>
					<input id="filter-id" type="number" min="1">
				</div>

				<div class="filter-group">
					<label for="filter-type">Tipo</label>
					<select id="filter-type">
						<option value="all">Todos</option>
					</select>
				</div>
			</section>

			<p id="results-count"></p>
			<section id="pokemon-list" class="pokemon-grid" aria-live="polite"></section>
		</div>
	</main>
	<site-footer></site-footer>
    <script src="webcomponents.js"></script>
	<script src="app.js"></script>
</body>
</html>
